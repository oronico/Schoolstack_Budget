kind = "slides"
previewPath = "/budget-exec-deck/"
title = "Budget — Executive Brief"
version = "1.0.0"
id = "artifacts/budget-exec-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/budget-exec-deck/" ]
localPort = 25242

[services.development]
run = "pnpm --filter @workspace/budget-exec-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/budget-exec-deck", "run", "build" ]
publicDir = "artifacts/budget-exec-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25242"
BASE_PATH = "/budget-exec-deck/"
