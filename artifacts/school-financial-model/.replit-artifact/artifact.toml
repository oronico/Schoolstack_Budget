kind = "web"
previewPath = "/"
title = "School Financial Model Builder"
version = "1.0.0"
id = "artifacts/school-financial-model"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22092
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/school-financial-model run dev"

[services.env]
PORT = "22092"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/school-financial-model", "run", "build"]
publicDir = "artifacts/school-financial-model/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
