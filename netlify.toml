[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/school-financial-model run build"
  publish = "artifacts/school-financial-model/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  BASE_PATH = "/"
  VITE_API_BASE_URL = "https://schoolstackbudget.up.railway.app"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/api/*"
  to = "https://schoolstackbudget.up.railway.app/api/:splat"
  status = 200
  force = true
  [redirects.headers]
    Host = "schoolstackbudget.up.railway.app"
    X-Forwarded-Host = "budget.schoolstack.ai"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
