[build]
  base = "artifacts/school-financial-model"
  command = "cd ../.. && pnpm install --frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/school-financial-model run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
