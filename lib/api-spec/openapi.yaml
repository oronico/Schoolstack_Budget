openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: models
    description: Financial model operations
  - name: public
    description: Public operations (no authentication required)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Start a confirm-by-email signup
      description: |
        Always returns 202 with the same response body whether or not the
        email is already registered. A new email receives a verification
        link; an existing email receives an "account already exists" email
        with a password-reset link. This makes /auth/register useless as
        an account-enumeration oracle (Task #527).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "202":
          description: Confirmation email dispatched (same body for new and existing emails)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify a pending signup and log the user in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Email verified, user provisioned and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired verification token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/lender-language:
    patch:
      operationId: updateLenderLanguage
      tags: [auth]
      summary: Update lender-language preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LenderLanguageRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email sent (always returns success)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: List user's financial models
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinancialModelSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createModel
      tags: [models]
      summary: Create a new financial model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFinancialModelData"
      responses:
        "201":
          description: Model created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}:
    get:
      operationId: getModel
      tags: [models]
      summary: Get a financial model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Model details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateModel
      tags: [models]
      summary: Update a financial model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFinancialModelData"
      responses:
        "200":
          description: Model updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteModel
      tags: [models]
      summary: Delete a financial model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Model deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/duplicate:
    post:
      operationId: duplicateModel
      tags: [models]
      summary: Duplicate a financial model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Model duplicated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/archive:
    post:
      operationId: archiveModel
      tags: [models]
      summary: Archive a financial model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Model archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialModel"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/consultant:
    get:
      operationId: getConsultantAnalysis
      tags: [models]
      summary: Run consultant analysis on a financial model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consultant analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultantOutput"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/export:
    get:
      operationId: exportModel
      tags: [models]
      summary: Export financial model as Excel workbook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/export/pro-forma-pdf:
    get:
      operationId: exportProFormaPdf
      tags: [models]
      summary: Export financial model as Pro Forma PDF
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/export/loan-readiness-pdf:
    get:
      operationId: exportLoanReadinessPdf
      tags: [models]
      summary: Export loan readiness report as PDF
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/export/lender-proforma:
    get:
      operationId: exportLenderProforma
      tags: [models]
      summary: Export lender pro forma as template-based Excel workbook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /models/{id}/export/underwriting:
    get:
      operationId: exportUnderwriting
      tags: [models]
      summary: Export 14-tab underwriting pro forma Excel workbook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /public/export-underwriting:
    post:
      operationId: publicExportUnderwriting
      tags: [public]
      summary: Export underwriting workbook without authentication
      description: Accepts full model data payload and returns a 14-tab underwriting Excel workbook. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicExportRequest"
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid model data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /public/consultant:
    post:
      operationId: publicConsultantAnalysis
      tags: [public]
      summary: Run consultant analysis without authentication
      description: Accepts full model data payload and returns consultant analysis with readiness score, key metrics, and recommendations. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicExportRequest"
      responses:
        "200":
          description: Consultant analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultantOutput"
        "400":
          description: Invalid model data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    PublicExportRequest:
      type: object
      properties:
        schoolProfile:
          type: object
        enrollment:
          type: object
        tuitionTiers:
          type: array
          items:
            type: object
        revenue:
          type: object
        revenueRows:
          type: array
          items:
            type: object
        staffing:
          type: object
        staffingRows:
          type: array
          items:
            type: object
        facilities:
          type: object
        expenseRows:
          type: array
          items:
            type: object
        capitalAndDebtRows:
          type: array
          items:
            type: object
        priorYearSnapshot:
          type: object
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 200
        name:
          type: string
          maxLength: 100
        schoolName:
          type: string
          nullable: true
          maxLength: 200
        role:
          type: string
          nullable: true
          maxLength: 100
        planningStage:
          type: string
          nullable: true
          maxLength: 100
      required:
        - email
        - password
        - name
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          maxLength: 200
      required:
        - email
        - password
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
      required:
        - email
    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
          maxLength: 256
      required:
        - token
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          maxLength: 256
        password:
          type: string
          minLength: 8
          maxLength: 200
      required:
        - token
        - password
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        token:
          type: string
      required:
        - user
        - token
    UserResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        guidanceLevel:
          type: string
          nullable: true
          enum:
            - advanced
            - basics
            - extra
        personaStage:
          type: string
          nullable: true
          enum:
            - yet_to_launch
            - existing
        personaComfort:
          type: string
          nullable: true
          enum:
            - new_to_budgeting
            - comfortable
        lenderLanguageEnabled:
          type: boolean
      required:
        - id
        - email
        - name
    LenderLanguageRequest:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled
    ModelStatus:
      type: string
      enum: [draft, active, complete, archived]
    SchoolStage:
      type: string
      enum: [new_school, operating_school]
    FundingProfile:
      type: string
      enum: [tuition_based, charter_public_funded, hybrid_mixed]
    RevenueDriverType:
      type: string
      enum: [annual_fixed, monthly, per_student, percent_of_base]
    ExpenseDriverType:
      type: string
      enum: [annual_fixed, monthly, per_student, per_new_student, per_returning_student, percent_of_revenue, per_fte]
    StaffingFunctionCategory:
      type: string
      enum: [instructional, school_leadership, student_support, operations, administrative, other]
    StaffingEmploymentType:
      type: string
      enum: [full_time, part_time, contract]
    RevenueCategory:
      type: string
      enum:
        - tuition_and_fees
        - tuition_offsets
        - public_funding
        - school_choice
        - grants_contributions
        - philanthropy
        - other_revenue
    ExpenseCategory:
      type: string
      description: Built-in categories (personnel, instructional_program, technology, occupancy_facility, administrative_general, capital_financing) plus user-defined custom categories
    RevenueRow:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        category:
          $ref: "#/components/schemas/RevenueCategory"
        lineItem:
          type: string
        enabled:
          type: boolean
        driverType:
          $ref: "#/components/schemas/RevenueDriverType"
        amounts:
          type: array
          items:
            type: number
        percentBase:
          type: string
        note:
          type: string
        billingMonths:
          type: integer
          enum: [9, 10, 12]
        collectionMethod:
          type: string
          enum: [autopay, invoiced, mixed]
        collectionRate:
          type: number
          minimum: 0
          maximum: 100
        collectionDelayDays:
          type: integer
        paymentFrequency:
          type: string
          enum: [monthly, quarterly, semi_annual, annual]
        paymentTiming:
          type: string
          enum: [upfront, arrears]
        disbursementType:
          type: string
          enum: [direct, reimbursement]
        reimbursementLagMonths:
          type: integer
        grantStatus:
          type: string
          enum: [confirmed, projected]
        receiptQuarter:
          type: integer
          enum: [1, 2, 3, 4]
        escalationRate:
          type: number
      required:
        - id
        - category
        - lineItem
        - enabled
        - driverType
        - amounts
    StaffingRow:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        roleName:
          type: string
        functionCategory:
          $ref: "#/components/schemas/StaffingFunctionCategory"
        employmentType:
          $ref: "#/components/schemas/StaffingEmploymentType"
        fte:
          type: number
        annualizedRate:
          type: number
        benefitsEligible:
          type: boolean
        benefitsRate:
          type: number
        payrollTaxRate:
          type: number
        payrollLike:
          type: boolean
        notes:
          type: string
        staffingMode:
          type: string
          enum: [fixed, ratio]
          default: fixed
        studentRatio:
          type: number
        minFte:
          type: number
        maxFte:
          type: number
        startYear:
          type: integer
        endYear:
          type: integer
      required:
        - id
        - roleName
        - functionCategory
        - employmentType
        - fte
        - annualizedRate
        - benefitsEligible
        - benefitsRate
        - payrollTaxRate
        - payrollLike
    ExpenseRow:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        category:
          $ref: "#/components/schemas/ExpenseCategory"
        lineItem:
          type: string
        enabled:
          type: boolean
        driverType:
          $ref: "#/components/schemas/ExpenseDriverType"
        amounts:
          type: array
          items:
            type: number
        note:
          type: string
        escalationRate:
          type: number
      required:
        - id
        - category
        - lineItem
        - enabled
        - driverType
        - amounts
    CapitalDebtRow:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        lineItem:
          type: string
        enabled:
          type: boolean
        driverType:
          $ref: "#/components/schemas/ExpenseDriverType"
        amounts:
          type: array
          items:
            type: number
        note:
          type: string
        isLoan:
          type: boolean
        loanPrincipal:
          type: number
        loanRate:
          type: number
        loanTermYears:
          type: number
        flatAnnualDebtService:
          type: number
        purpose:
          type: string
          enum: [startup, operating, refinance]
      required:
        - id
        - lineItem
        - enabled
        - driverType
        - amounts
    OpeningBalances:
      type: object
      additionalProperties: true
      properties:
        cash:
          type: number
        accountsReceivable:
          type: number
        fixedAssets:
          type: number
        otherAssets:
          type: number
        accountsPayable:
          type: number
        currentDebtPortion:
          type: number
        longTermDebt:
          type: number
    SourcesAndUsesItem:
      type: object
      properties:
        lineItem:
          type: string
        amount:
          type: number
        category:
          type: string
    SourcesAndUses:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourcesAndUsesItem"
        uses:
          type: array
          items:
            $ref: "#/components/schemas/SourcesAndUsesItem"
    Scenario:
      type: object
      properties:
        name:
          type: string
        enrollmentAdjustment:
          type: number
        tuitionAdjustment:
          type: number
        expenseAdjustment:
          type: number
        staffingAdjustment:
          type: number
        facilityAdjustment:
          type: number
    CovenantThresholds:
      type: object
      properties:
        minDSCR:
          type: number
        minDaysCashOnHand:
          type: number
        minMonthsRunway:
          type: number
        minCapacityUtil:
          type: number
        minCurrentRatio:
          type: number
        dscrByYear:
          type: array
          items:
            type: number
          minItems: 5
          maxItems: 5
    PriorYearSnapshot:
      type: object
      additionalProperties: true
      properties:
        endingEnrollment:
          type: integer
          minimum: 0
        totalRevenue:
          type: number
