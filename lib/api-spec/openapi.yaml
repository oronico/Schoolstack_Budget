    AccountingExport:
      type: object
      additionalProperties: true
      description: >
        Parsed totals from an uploaded accounting P&L export (e.g. QuickBooks
        CSV). Stored alongside the model so the actuals editor can suggest
        from real books. Re-uploading replaces this object in place.
      properties:
        filename:
          type: string
          description: Original filename of the uploaded export.
        uploadedAt:
          type: string
          description: ISO-8601 timestamp string of when the file was uploaded.
        totals:
          type: object
          additionalProperties: true
          properties:
            totalRevenue:
              type: number
              nullable: true
            totalExpenses:
              type: number
              nullable: true
            netIncome:
              type: number
              nullable: true
            tuitionRevenue:
              type: number
              nullable: true
              description: >
                Tuition income subtotal pulled from the export (e.g. a
                "Tuition" or "Total Tuition Income" row). Optional — left
                unset when the parser couldn't confidently identify a row.
            philanthropyRevenue:
              type: number
              nullable: true
              description: >
                Philanthropy / donations / contributions subtotal pulled
                from the export. Optional — left unset when no recognized
                row was found.
            payrollExpense:
              type: number
              nullable: true
              description: >
                Payroll / salaries / personnel subtotal pulled from the
                export. Stored as a positive magnitude. Optional — left
                unset when no recognized row was found.
            facilityExpense:
              type: number
              nullable: true
              description: >
                Facility / rent / occupancy subtotal pulled from the
                export. Stored as a positive magnitude. Optional — left
                unset when no recognized row was found.
        parseWarnings:
          type: array
          items:
            type: string
