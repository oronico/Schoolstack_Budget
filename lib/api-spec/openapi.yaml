            value is `{ confidence, evidenceNote? }` with confidence one of
            actuals | signed_agreement | quote | research | estimate.
          additionalProperties:
            type: object
            properties:
              confidence:
                type: string
                enum: [actuals, signed_agreement, quote, research, estimate]
              evidenceNote:
                type: string
              evidenceFiles:
                type: array
                description: |
                  Task #707 — founder-uploaded evidence documents (lease,
                  MOU, payroll quote, etc.) attached to this assumption.
                  An entry with at least one file counts as evidence-backed
                  in the rollup, the lender PDF lists each file in the
                  evidence appendix, and the Excel notes column shows the
                  filenames alongside the founder's note.
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    mimeType:
                      type: string
                    size:
                      type: integer
                    uploadedAt:
                      type: string
                    objectPath:
                      type: string
                      description: |
                        Task #714 — object storage path for the uploaded
                        file (e.g. `/objects/uploads/<uuid>`). When set,
                        the file lives in App Storage and the model JSON
                        no longer carries the bytes inline. Serve via
                        `GET /api/storage{objectPath}`.
                  required:
                    - id
                    - name
                    - mimeType
                    - size
                    - uploadedAt
            required:
              - confidence
