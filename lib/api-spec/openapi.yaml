        # Task #616 — fixed lender stress-test battery (enrollment -10/-20%,
        # ESA delay, rent shock, founder normalization). Computed from the
        # canonical engine and surfaced on the founder dashboard, consultant
        # view, lender packet PDF, and lender pro-forma workbook.
        lenderStressTests:
