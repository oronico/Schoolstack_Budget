name: playwright-cross-browser

# Runs the @smoke Playwright suite across chromium, firefox, and webkit
# on every PR and on every push to main. Each browser is its own job so
# a failure in one (commonly webkit, which trips on subtle ESM/MIME
# issues that the other two tolerate) doesn't mask the others, and the
# matrix surfaces all real failures in one pass instead of one-at-a-time
# retries.
#
# Mirrors excel-export-smoke.yml conventions:
#   - pnpm version comes from the root package.json `packageManager`
#     field (do NOT pin `version:` on pnpm/action-setup, that errors).
#   - node 22 with pnpm cache.
#
# Locally on Replit we only have chromium (REPLIT_PLAYWRIGHT_CHROMIUM_EXECUTABLE
# points at a Nix-store binary). Firefox + webkit are downloaded via
# `playwright install --with-deps` here, which apt-installs the GTK /
# audio libs that aren't present in the Nix container.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # Run all three browsers even if one fails so the PR check shows
      # every actual failure on the first run instead of forcing the
      # contributor to play whack-a-mole one push at a time.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      # Tell playwright.config.ts to start the dev servers itself rather
      # than rely on Replit-style ambient workflows.
      E2E_START_SERVERS: "1"
      # Force a stable JIT seed for the api-server's JWT signer so
      # registration tokens validate deterministically across browsers.
      JWT_SECRET: ci-playwright-cross-browser-fixed-secret
      CI: "true"
      # DATABASE_URL points at the Railway-hosted Postgres the app
      # already uses. The api-server's validateEnv() treats
      # DATABASE_URL as fatal at boot (intentionally — the app
      # depends on persistent storage for auth/models/etc.), so an
      # unset value crashes the webServer before Playwright ever
      # runs. Configure the value in
      #   GitHub → Settings → Secrets and variables → Actions →
      #   New repository secret
      # with name `DATABASE_URL` and the Railway connection string
      # as its value.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser + system deps for ${{ matrix.browser }}
        # `--with-deps` apt-installs the libgtk-3-0t64 / libpango / libasound
        # cluster on Ubuntu so firefox + webkit can actually launch.
        # Chromium is downloaded too; on Replit we'd reuse the Nix-store
        # binary, but on GitHub Actions there is no such pre-install.
        run: |
          pnpm --filter @workspace/school-financial-model exec \
            playwright install --with-deps ${{ matrix.browser }}

      - name: Run @smoke suite on ${{ matrix.browser }}
        # Scope to the @smoke tag — full e2e is too slow for the PR
        # gate. Pin to the matrix browser so the three jobs report
        # cleanly and so a single browser's failure doesn't poison the
        # other shards via shared retries.
        run: |
          pnpm --filter @workspace/school-financial-model exec \
            playwright test --grep @smoke --project ${{ matrix.browser }}

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: artifacts/school-financial-model/playwright-report
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: artifacts/school-financial-model/test-results
          retention-days: 14
