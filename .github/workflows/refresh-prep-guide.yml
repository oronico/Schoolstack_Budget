name: refresh-prep-guide

# Task #933 — keep the Model Prep Guide PDF in sync with the wizard UI
# automatically. The PNGs under `public/images/prep-guide/` and the
# bundled `public/prep-guide.pdf` only refresh when someone remembers
# to run `capture:prep-guide` + `build:prep-guide` locally; without
# this job the printable guide silently drifts as the wizard evolves.
#
# This workflow:
#   1. Boots ephemeral api-server + Vite dev server via
#      `refresh:prep-guide` (the same wrapper a contributor would run
#      locally), captures all 10 wizard screenshots with Playwright
#      Chromium, then rebuilds the PDF.
#   2. If anything under `artifacts/school-financial-model/public/images/prep-guide/`
#      or `artifacts/school-financial-model/public/prep-guide.pdf`
#      changed, commits the diff back to the branch (on `main` /
#      `workflow_dispatch`) or opens a pull request (on `schedule`).
#
# Triggers:
#   - workflow_dispatch: on-demand (e.g. right after a wizard UI ships)
#   - schedule (weekly): catches drift even if nobody remembers to run
#     it after a change. Sunday 06:00 UTC is outside US working hours.
#
# Conventions mirror excel-export-smoke.yml / playwright-cross-browser.yml:
#   - pnpm version comes from the root package.json `packageManager`
#     field (do NOT pin `version:` on pnpm/action-setup, that errors).
#   - node 22 with pnpm cache.
#   - Playwright's Chromium is installed with `--with-deps` so the apt
#     packages it needs (libgtk, libpango, libasound, etc.) are present.
#     The capture script previously hit a "browser not installed" gap
#     in CI when this step was missing, hence the explicit note in the
#     task description.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Sunday 06:00 UTC. Cheap insurance against silent drift.
    - cron: "0 6 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # The api-server boots without DATABASE_URL by falling back to its
      # bundled in-memory shim — same pattern as playwright-cross-browser.yml.
      JWT_SECRET: ci-refresh-prep-guide-fixed-secret
      CI: "true"
      # Pin ports so the wrapper's "is something already on this port?"
      # short-circuit doesn't accidentally fire against unrelated CI
      # services.
      REFRESH_API_PORT: "8080"
      REFRESH_WEB_PORT: "22094"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + system deps
        # `--with-deps` apt-installs the libgtk-3-0t64 / libpango /
        # libasound cluster Chromium needs on Ubuntu. Skipping this is
        # the gap the task description calls out explicitly.
        run: |
          pnpm --filter @workspace/school-financial-model exec \
            playwright install --with-deps chromium

      - name: Capture wizard screenshots + rebuild prep-guide.pdf
        run: pnpm --filter @workspace/school-financial-model run refresh:prep-guide

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          PATHS=(
            "artifacts/school-financial-model/public/images/prep-guide"
            "artifacts/school-financial-model/public/prep-guide.pdf"
          )
          if git diff --quiet -- "${PATHS[@]}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No prep-guide drift detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Prep-guide drift detected:"
            git --no-pager diff --stat -- "${PATHS[@]}"
          fi

      - name: Upload refreshed assets as workflow artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prep-guide-refresh
          path: |
            artifacts/school-financial-model/public/images/prep-guide/
            artifacts/school-financial-model/public/prep-guide.pdf
          retention-days: 14

      - name: Commit refreshed assets (workflow_dispatch on main)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            artifacts/school-financial-model/public/images/prep-guide \
            artifacts/school-financial-model/public/prep-guide.pdf
          git commit -m "chore(prep-guide): refresh screenshots + PDF [skip ci]"
          git push origin HEAD:${GITHUB_REF#refs/heads/}

      - name: Open PR with refreshed assets (scheduled)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(prep-guide): refresh screenshots + PDF"
          branch: chore/prep-guide-refresh
          delete-branch: true
          title: "chore(prep-guide): refresh screenshots + PDF"
          body: |
            Automated refresh from `.github/workflows/refresh-prep-guide.yml`.

            The Model Prep Guide screenshots and / or PDF drifted from the
            current wizard UI. Review the diff under
            `artifacts/school-financial-model/public/images/prep-guide/` and
            `artifacts/school-financial-model/public/prep-guide.pdf`, then
            merge if the new captures look correct.

            Reproduce locally with:

            ```
            pnpm --filter @workspace/school-financial-model run refresh:prep-guide
            ```
          add-paths: |
            artifacts/school-financial-model/public/images/prep-guide/**
            artifacts/school-financial-model/public/prep-guide.pdf
