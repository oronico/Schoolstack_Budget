name: prep-guide-drift

# Task #892 + #936 — keep the Model Prep Guide PDF honest at PR time.
#
# The Prep Guide PDF (`artifacts/school-financial-model/public/prep-guide.pdf`)
# and its source screenshots under `public/images/prep-guide/` are
# regenerated by founders/contributors via the wrapper script:
#
#   pnpm --filter @workspace/school-financial-model run refresh:prep-guide
#
# Without an automated PR check, a contributor can ship a wizard UI
# tweak and not realize the printable guide is now stale — the scheduled
# `refresh-prep-guide` workflow only catches drift weekly. This job
# re-runs the same wrapper against the PR contents and fails if the
# regenerated screenshots / PDF differ from what's committed. PDFKit is
# configured to be byte-deterministic in `build-prep-guide.ts` (fixed
# CreationDate / ModDate / file-ID), so the diff is high-signal: any
# drift means a contributor forgot to re-run `refresh:prep-guide` (or
# forgot to commit its output) before pushing.
#
# Paths-filtered so unrelated PRs don't pay the ~Playwright-Chromium
# cost. Both wizard component trees are included — `src/pages/model-wizard/**`
# (the step pages themselves) and `src/components/wizard/**` (shared
# wizard UI like the assumption confidence card / checklists that render
# inside the captured screenshots) — because a UI change in either
# place should prompt the author to re-run the refresh script.

on:
  pull_request:
    paths:
      - "artifacts/school-financial-model/scripts/prep-guide/**"
      - "artifacts/school-financial-model/scripts/capture-prep-guide-screenshots.ts"
      - "artifacts/school-financial-model/scripts/refresh-prep-guide.ts"
      - "artifacts/school-financial-model/src/pages/model-wizard/**"
      - "artifacts/school-financial-model/src/components/wizard/**"
      - "artifacts/school-financial-model/public/prep-guide.pdf"
      - "artifacts/school-financial-model/public/images/prep-guide/**"
      - "artifacts/api-server/scripts/build-prep-guide.ts"
      - "artifacts/api-server/src/lib/pdf-utils.ts"
      - ".github/workflows/prep-guide-drift.yml"
  push:
    branches: [main]
    paths:
      - "artifacts/school-financial-model/scripts/prep-guide/**"
      - "artifacts/school-financial-model/scripts/capture-prep-guide-screenshots.ts"
      - "artifacts/school-financial-model/scripts/refresh-prep-guide.ts"
      - "artifacts/school-financial-model/src/pages/model-wizard/**"
      - "artifacts/school-financial-model/src/components/wizard/**"
      - "artifacts/school-financial-model/public/prep-guide.pdf"
      - "artifacts/school-financial-model/public/images/prep-guide/**"
      - "artifacts/api-server/scripts/build-prep-guide.ts"
      - "artifacts/api-server/src/lib/pdf-utils.ts"
      - ".github/workflows/prep-guide-drift.yml"

jobs:
  check-prep-guide-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # The api-server boots without DATABASE_URL by falling back to its
      # bundled in-memory shim — same pattern as playwright-cross-browser.yml.
      JWT_SECRET: ci-prep-guide-drift-fixed-secret
      CI: "true"
      # Pin the ports the wrapper expects so its "is something already on
      # this port?" short-circuit doesn't fire against unrelated CI services.
      REFRESH_API_PORT: "8080"
      REFRESH_WEB_PORT: "22094"
      # Skip the Replit-only Vite plugins (cartographer / runtime-error
      # modal / dev-banner) the same way the e2e webServer does — they
      # watch the whole workspace and aren't needed under headless capture.
      E2E_MODE: "1"

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from the root package.json `packageManager`
      # field. Do NOT set `version:` here — pnpm/action-setup@v4 errors
      # with ERR_PNPM_BAD_PM_VERSION if both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (+ system deps)
        # `capture:prep-guide` (invoked via the refresh wrapper) drives a
        # headless Chromium against the ephemeral dev servers.
        # `--with-deps` apt-installs the GTK / audio libs that aren't
        # present in the GitHub Actions Ubuntu image by default.
        run: |
          pnpm --filter @workspace/school-financial-model exec \
            playwright install --with-deps chromium

      - name: Re-capture screenshots + rebuild prep-guide.pdf
        # Same one-shot wrapper a contributor would run locally — it
        # boots api-server + Vite, runs capture, runs build, and tears
        # everything back down. Keeps this check and `refresh-prep-guide.yml`
        # in lockstep.
        run: pnpm --filter @workspace/school-financial-model run refresh:prep-guide

      - name: Fail if prep-guide.pdf or screenshots drifted from what's committed
        run: |
          # Diff both the PDF and the screenshot directory. Either signal
          # means a contributor changed wizard UI or content.ts without
          # re-running the refresh wrapper locally and committing the result.
          if ! git diff --exit-code -- \
              artifacts/school-financial-model/public/prep-guide.pdf \
              artifacts/school-financial-model/public/images/prep-guide; then
            echo ""
            echo "::error::Prep Guide PDF or wizard screenshots are stale."
            echo ""
            echo "Re-running refresh:prep-guide produced output that doesn't"
            echo "match what's committed. Most likely you changed a wizard"
            echo "step (src/pages/model-wizard or src/components/wizard) or"
            echo "scripts/prep-guide/content.ts without regenerating the"
            echo "screenshots / PDF."
            echo ""
            echo "To fix locally:"
            echo "  pnpm --filter @workspace/school-financial-model run refresh:prep-guide"
            echo "  git add artifacts/school-financial-model/public/prep-guide.pdf \\"
            echo "          artifacts/school-financial-model/public/images/prep-guide"
            echo ""
            git --no-pager diff --stat -- \
              artifacts/school-financial-model/public/prep-guide.pdf \
              artifacts/school-financial-model/public/images/prep-guide || true
            exit 1
          fi
          echo "Prep Guide PDF + screenshots match what refresh:prep-guide produces — no drift."

      - name: Upload regenerated Prep Guide artifacts on drift
        # When the diff check fails, surface the freshly-generated PDF +
        # screenshots so a contributor can download them, eyeball the
        # diff, and commit if they're the intended new output.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prep-guide-regenerated
          path: |
            artifacts/school-financial-model/public/prep-guide.pdf
            artifacts/school-financial-model/public/images/prep-guide/
          retention-days: 14
