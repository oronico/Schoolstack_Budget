name: prep-guide-drift

# Task #892 — keep the Model Prep Guide PDF honest.
#
# The Prep Guide PDF (`artifacts/school-financial-model/public/prep-guide.pdf`)
# is regenerated manually by founders/contributors via:
#
#   pnpm --filter @workspace/school-financial-model run capture:prep-guide
#   pnpm --filter @workspace/school-financial-model run build:prep-guide
#
# Without an automated check, the committed PDF can quietly drift away from
# `scripts/prep-guide/content.ts` or the wizard screenshots that feed it.
# This job re-runs the PDF build against whatever is committed in the PR
# (content + screenshots) and fails if the resulting PDF differs from the
# committed `prep-guide.pdf`. PDFKit is configured to be byte-deterministic
# in `build-prep-guide.ts` (fixed CreationDate / ModDate / file-ID), so the
# diff is high-signal: any drift means a contributor forgot to re-run the
# build (or, if they changed wizard UI, forgot to re-capture screenshots
# *and* rebuild) before committing.
#
# Triggers paths-filtered so unrelated PRs don't pay the cost. Wizard step
# files are included because a UI change there should prompt the author to
# re-capture screenshots locally and commit both the new PNGs and the new
# PDF — the diff check then enforces that bundle stays consistent.

on:
  pull_request:
    paths:
      - "artifacts/school-financial-model/scripts/prep-guide/**"
      - "artifacts/school-financial-model/scripts/capture-prep-guide-screenshots.ts"
      - "artifacts/school-financial-model/src/pages/model-wizard/**"
      - "artifacts/school-financial-model/public/prep-guide.pdf"
      - "artifacts/school-financial-model/public/images/prep-guide/**"
      - "artifacts/api-server/scripts/build-prep-guide.ts"
      - "artifacts/api-server/src/lib/pdf-utils.ts"
      - ".github/workflows/prep-guide-drift.yml"
  push:
    branches: [main]
    paths:
      - "artifacts/school-financial-model/scripts/prep-guide/**"
      - "artifacts/school-financial-model/scripts/capture-prep-guide-screenshots.ts"
      - "artifacts/school-financial-model/src/pages/model-wizard/**"
      - "artifacts/school-financial-model/public/prep-guide.pdf"
      - "artifacts/school-financial-model/public/images/prep-guide/**"
      - "artifacts/api-server/scripts/build-prep-guide.ts"
      - "artifacts/api-server/src/lib/pdf-utils.ts"
      - ".github/workflows/prep-guide-drift.yml"

jobs:
  check-prep-guide-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from the root package.json `packageManager`
      # field. Do NOT set `version:` here — pnpm/action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION if both are specified.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (+ system deps)
        # `capture:prep-guide` drives a headless Chromium against the
        # running dev servers. `--with-deps` apt-installs the GTK / audio
        # libs that aren't present in the GitHub Actions Ubuntu image by
        # default. We only need chromium — firefox/webkit are not used.
        run: |
          pnpm --filter @workspace/school-financial-model exec \
            playwright install --with-deps chromium

      - name: Start api-server (port 8080) in the background
        env:
          PORT: "8080"
          # Deterministic JWT secret so the capture script's throwaway
          # registration tokens validate. Mirrors what
          # playwright-cross-browser.yml does.
          JWT_SECRET: ci-prep-guide-drift-fixed-secret
          NODE_ENV: development
        run: |
          mkdir -p .local/prep-guide-logs
          pnpm --filter @workspace/api-server run dev \
            > .local/prep-guide-logs/api-server.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Start school-financial-model dev server (port 22094) in the background
        env:
          PORT: "22094"
          # Skip the Replit-only Vite plugins (cartographer / runtime-error
          # modal / dev-banner) the same way the e2e webServer does — they
          # watch the whole workspace and aren't needed under headless
          # capture.
          E2E_MODE: "1"
          VITE_API_PROXY_TARGET: "http://127.0.0.1:8080"
        run: |
          pnpm --filter @workspace/school-financial-model run dev \
            > .local/prep-guide-logs/web.log 2>&1 &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for api-server + web to become healthy
        run: |
          # Wait up to 120s for the api-server healthz endpoint, then up to
          # 120s for vite to start serving HTML. Bail loudly with the tail
          # of the relevant log if either never comes up.
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/api/healthz >/dev/null 2>&1; then
              echo "api-server is healthy"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "::error::api-server never became healthy. Tail of log:"
              tail -n 200 .local/prep-guide-logs/api-server.log || true
              exit 1
            fi
            sleep 2
          done
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:22094/ >/dev/null 2>&1; then
              echo "web dev server is healthy"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "::error::web dev server never became healthy. Tail of log:"
              tail -n 200 .local/prep-guide-logs/web.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Re-capture wizard screenshots for the Prep Guide
        env:
          CAPTURE_WEB_PORT: "22094"
          CAPTURE_API_URL: "http://127.0.0.1:8080"
        run: pnpm --filter @workspace/school-financial-model run capture:prep-guide

      - name: Rebuild the Prep Guide PDF from the freshly-captured screenshots
        run: pnpm --filter @workspace/school-financial-model run build:prep-guide

      - name: Stop background dev servers
        if: always()
        run: |
          if [ -n "${WEB_PID:-}" ]; then kill "$WEB_PID" 2>/dev/null || true; fi
          if [ -n "${API_PID:-}" ]; then kill "$API_PID" 2>/dev/null || true; fi

      - name: Fail if prep-guide.pdf or screenshots drifted from what's committed
        run: |
          # Diff both the PDF and the screenshot directory. Either signal
          # means a contributor changed wizard UI or content.ts without
          # re-running capture/build locally and committing the result.
          if ! git diff --exit-code -- \
              artifacts/school-financial-model/public/prep-guide.pdf \
              artifacts/school-financial-model/public/images/prep-guide; then
            echo ""
            echo "::error::Prep Guide PDF or wizard screenshots are stale."
            echo ""
            echo "Re-running capture:prep-guide + build:prep-guide produced output"
            echo "that doesn't match what's committed. Most likely you changed a"
            echo "wizard step or scripts/prep-guide/content.ts without regenerating"
            echo "the screenshots / PDF."
            echo ""
            echo "To fix locally:"
            echo "  pnpm --filter @workspace/school-financial-model run capture:prep-guide"
            echo "  pnpm --filter @workspace/school-financial-model run build:prep-guide"
            echo "  git add artifacts/school-financial-model/public/prep-guide.pdf \\"
            echo "          artifacts/school-financial-model/public/images/prep-guide"
            echo ""
            git --no-pager diff --stat -- \
              artifacts/school-financial-model/public/prep-guide.pdf \
              artifacts/school-financial-model/public/images/prep-guide || true
            exit 1
          fi
          echo "Prep Guide PDF + screenshots match what capture/build produce — no drift."

      - name: Upload regenerated Prep Guide artifacts on drift
        # When the diff check fails, surface the freshly-generated PDF +
        # screenshots so a contributor can download them, eyeball the
        # diff, and commit if they're the intended new output.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prep-guide-regenerated
          path: |
            artifacts/school-financial-model/public/prep-guide.pdf
            artifacts/school-financial-model/public/images/prep-guide/
            .local/prep-guide-logs/
          retention-days: 14
